# Production Docker Swarm stack
# Usage: TAG=v1 docker stack deploy -c docker-compose.yml collegenav
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      placement:
        constraints: [node.role == manager]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: ${REGISTRY:-registry.local}/collegenav-server:${TAG:-latest}
    secrets:
      - database_url
      - session_secret
      - admin_password
      - mcp_default_token
      - github_client_id
      - github_client_secret
      - google_client_id
      - google_client_secret
    entrypoint: ["/app/entrypoint.sh"]
    command: ["node", "dist/index.js"]
    environment:
      NODE_ENV: production
      PORT: "3000"
      APP_DOMAIN: ${APP_DOMAIN:-collegenavigator.jtlapp.net}
    deploy:
      labels:
        caddy: ${APP_DOMAIN:-collegenavigator.jtlapp.net}
        caddy.reverse_proxy: "{{upstreams 3000}}"
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
    depends_on:
      - db

secrets:
  database_url:
    external: true
  session_secret:
    external: true
  admin_password:
    external: true
  mcp_default_token:
    external: true
  github_client_id:
    external: true
  github_client_secret:
    external: true
  google_client_id:
    external: true
  google_client_secret:
    external: true

volumes:
  pgdata:
